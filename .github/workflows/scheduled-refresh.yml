name: Scheduled YouTube refresh (tier A)

on:
  workflow_dispatch: {}
  schedule:
    - cron: "30 1 * * *" # 07:00 IST daily — tier-A: top-500 channel stats + recent videos

concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: pip install -e .
      - name: Guard — skip cleanly if secrets are not configured
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: |
          if [ -z "$DATABASE_URL" ] || [ -z "$YOUTUBE_API_KEY" ]; then
            echo "DATABASE_URL / YOUTUBE_API_KEY not set — skipping (set repo secrets to enable)."
            echo "SKIP=1" >> "$GITHUB_ENV"
          fi
      - name: Tier-A refresh (channel stats + recent videos)
        if: env.SKIP != '1'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: |
          python -m apps.ingest.refresh channels --tier a
          python -m apps.ingest.refresh videos --tier a --max-videos 10
