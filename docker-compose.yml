# Day 1-2: `docker compose up -d postgres` (light).
# Day 3+:  `docker compose --profile airflow up -d --build` brings up Airflow
#          (LocalExecutor) on a CUSTOM image with an isolated ingest venv
#          (docker/airflow/Dockerfile).
# Host ports remapped to coexist with other projects on this host (ADR-0003):
#   webserver 8089:8080  (8088 is jobatlas-airflow, host 8080 is sentinelops).

x-airflow-build: &airflow-build
  build:
    context: .
    dockerfile: docker/airflow/Dockerfile
  image: creatorpulse-airflow:2.9.3
  # Run as the host uid (group 0) so tasks can write the host-mounted ./data
  # (quota_usage.json). The official Airflow image supports arbitrary uid + gid 0.
  # Set AIRFLOW_UID in .env:  echo "AIRFLOW_UID=$(id -u)" >> .env
  user: "${AIRFLOW_UID:-50000}:0"

x-airflow-env: &airflow-env
  AIRFLOW__CORE__EXECUTOR: LocalExecutor
  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-db:5432/airflow
  AIRFLOW__CORE__LOAD_EXAMPLES: "false"
  AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
  YOUTUBE_API_KEY: ${YOUTUBE_API_KEY:-}
  # In-network DSN for the ingest tasks: localhost:5436 is a host mapping and is
  # NOT reachable from inside a container -- use the compose service name.
  DATABASE_URL: postgresql://creatorpulse:creatorpulse@postgres:5432/creatorpulse

x-airflow-volumes: &airflow-volumes
  - ./orchestration/airflow/dags:/opt/airflow/dags
  - ./apps:/opt/airflow/project/apps:ro
  - ./data:/opt/airflow/project/data

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: creatorpulse-postgres
    environment:
      POSTGRES_USER: creatorpulse
      POSTGRES_PASSWORD: creatorpulse
      POSTGRES_DB: creatorpulse
    ports:
      - "5436:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./warehouse/sql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U creatorpulse"]
      interval: 10s
      timeout: 5s
      retries: 5

  airflow-db:
    image: postgres:16
    profiles: ["airflow"]
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflowdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  airflow-init:
    <<: *airflow-build
    profiles: ["airflow"]
    depends_on:
      airflow-db:
        condition: service_healthy
    environment:
      <<: *airflow-env
    entrypoint: /bin/bash
    command: -c "airflow db migrate && airflow users create --username admin --password admin --firstname a --lastname g --role Admin --email admin@example.com"

  airflow-webserver:
    <<: *airflow-build
    profiles: ["airflow"]
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    environment:
      <<: *airflow-env
    ports:
      - "8089:8080"
    volumes: *airflow-volumes
    command: webserver

  airflow-scheduler:
    <<: *airflow-build
    profiles: ["airflow"]
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    environment:
      <<: *airflow-env
    volumes: *airflow-volumes
    command: scheduler

volumes:
  pgdata:
  airflowdata:
