# Local/system hooks invoke the venv's tools so hook version == local fixer (ADR-0004).
# Run with the venv active so `ruff`/`sqlfluff` resolve to .venv.
# mypy is the exception (ADR-0009): isolated in pre-commit's own env because modern
# mypy needs pathspec>=1.0 while dbt caps pathspec<0.13 — they can't share the venv.
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-added-large-files
        args: ['--maxkb=500']
        exclude: '^docs/business/CreatorPulse_Executive_Workbook\.xlsx$'
      - id: check-yaml
      - id: check-merge-conflict
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff (lint, autofix)
        entry: ruff check --fix
        language: system
        types: [python]
      - id: ruff-format
        name: ruff (format)
        entry: ruff format
        language: system
        types: [python]
      - id: sqlfluff
        name: sqlfluff (lint)
        entry: sqlfluff lint
        language: system
        files: ^warehouse/dbt_project/.*\.sql$
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.20.2
    hooks:
      - id: mypy
        files: ^(apps|scripts)/
        args: [--ignore-missing-imports]
        additional_dependencies: [types-requests]
